# Configuration Alembic — migrations de schéma.
# L'URL de la base et la metadata sont injectées dans alembic/env.py
# (depuis app.config.settings et app.db.base.Base).

[alembic]
script_location = alembic
prepend_sys_path = .
# Format des fichiers de version : horodatage + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
version_path_separator = os

# sqlalchemy.url est surchargé par env.py (lecture de settings.DATABASE_URL).
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# (optionnel) formatage automatique des migrations générées


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
