apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: marketplace-b2b-back-ci-cd
    namespace: argocd
    annotations:
      notifications.argoproj.io/subscribe.on-sync-succeeded.slack: notification-argocd-back-dev
      notifications.argoproj.io/subscribe.on-sync-failed.slack: notification-argocd-back-dev
      notifications.argoproj.io/subscribe.on-outofsync.slack: notification-argocd-back-dev
      notifications.argoproj.io/subscribe.on-health-degraded.slack: notification-argocd-back-dev
spec:
    destination:
        namespace: marketplace-b2b-back-ci-cd
        server: https://kubernetes.default.svc
    project: marketplace-b2b-back-ci-cd
    source:
        helm:
            parameters:
                - name: image.repository
                  value: delmas007/market-place-b2b
                - name: image.tag
                  value: 6aac4cc7-304c-4ed4-8487-179694f18e07
        path: helm/marketplace-b2b-back-ci-cd-dev
        repoURL: https://github.com/Arnold-Freelance/marketplace-b2b-back-ci-cd
        targetRevision: helm-dev
    syncPolicy:
        automated:
            prune: false
            selfHeal: true
